<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Site</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Rubik:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #efebe3;
    --fg: #1a1714;
    --sc: #d2cec1;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Rubik', sans-serif;
    min-height: 100vh;
  }

  .scanlines {
    position: fixed;
    inset: 0;
    z-index: 9999;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0.06) 0px,
      rgba(0,0,0,0.06) 1px,
      transparent 1px,
      transparent 3px
    );
    background-size: 100% 3px;
    animation: scan 0.3s linear infinite;
  }

  @keyframes scan {
    to { background-position: 0 3px; }
  }

  #splash {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    cursor: pointer;
    transition: opacity 0.9s cubic-bezier(0.4, 0, 0.2, 1);
    user-select: none;
  }

  #splash.fade-out {
    opacity: 0;
    pointer-events: none;
  }

  .gif-box {
    width: 280px;
    height: 280px;
    border-radius: 3px;
    overflow: hidden;
    transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .gif-box:hover {
    transform: rotate(-2.5deg) scale(1.04);
  }

  .gif-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  #content {
    opacity: 0;
    transition: opacity 0.8s ease 0.4s;
  }

  #content.visible { opacity: 1; }

  main {
    max-width: 860px;
    margin: 0 auto;
    padding: 60px 40px;
  }

  .hero {
    margin-bottom: 60px;
  }

  .hero h1 {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: clamp(2.2rem, 5vw, 3.5rem);
    line-height: 1.4;
    margin-bottom: 16px;
  }

  .hero p {
    font-size: 1rem;
    line-height: 2;
    max-width: 540px;
  }

  code {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: 0.95rem;
    line-height: 2;
    max-width: 600px;
    background-color: var(--fg);
    color: var(--bg);
    padding: 2px;
  }

  section {
    border-top: 1px solid var(--sc);
    padding-top: 32px;
    margin-bottom: 48px;
  }

  section h2 {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: 1.5rem;
    margin-bottom: 14px;
  }

  section p {
    font-size: 0.95rem;
    line-height: 2;
    max-width: 600px;
  }

  .e {
    display: inline-block;
    height: 1.5em;
    width: auto;
    vertical-align: middle;
    position: relative;
    top: -0.1em;
    cursor: default;
    transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .e:hover {
    transform: rotate(-2.5deg) scale(1.04);
  }
</style>
</head>
<body>

<div class="scanlines"></div>

<div id="splash" onclick="reveal()">
  <div class="gif-box">
    <img src="https://assets.vivwebz.net/silly.gif" alt="">
  </div>
</div>

<div id="content">
  <main>
    <div class="hero">
      <h1>the internet's most dysphoric puppygirl <img class="e" src="https://assets.vivwebz.net/15583-oneko-sleep.gif" alt=""></h1>
      <p>a chronically online girlenby <img class="e" src="https://assets.vivwebz.net/22085-transgenderflag.png" alt="transgender flag"> <img class="e" src="https://assets.vivwebz.net/306760-nonbinary.png" alt="transgender flag"> who probably cares too much about telling you how much she cares about privacy</p>
    </div>

    <section>
      <h2>about</h2>
      <p>i'm <code id="age-display"></code> years old</p>
    </section>

    <section>
      <h2>work</h2>
      <p>expect future projects to be added here</p>
    </section>

    <section>
      <h2>contact</h2>
      <p>fluxer — <em>qwq#1234</em></p>
    </section>
  </main>
</div>

<audio id="bgm" src="https://assets.vivwebz.net/a_part_of_me.mp3" loop preload="auto"></audio>

<script>
  function reveal() {
    const bgm = document.getElementById('bgm');
    bgm.volume = 0.5;
    document.getElementById('splash').classList.add('fade-out');
    document.getElementById('content').classList.add('visible');
    bgm.play().catch(() => {});
    setTimeout(() => document.getElementById('splash').remove(), 1000);
  }

  const birthday = new Date('2009-12-21'); // your birthday

  function updateAge() {
    const ageMs = Date.now() - birthday.getTime();
    const age = ageMs / (1000 * 60 * 60 * 24 * 365.25);
    document.getElementById('age-display').textContent = age.toFixed(10);
  }

  updateAge();
  setInterval(updateAge, 100);
</script>
</body>
</html>
